[manifest]
dump_lua = true
priority = 0
version = "1.0.0"

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
G.hand.T.x = G.TILE_W - G.hand.T.w - 2.85
'''
position = "at"
payload = '''
G.hand.T.x = G.TILE_W - G.hand.T.w - 2.85 + ((SilkTouch.OS == 'Android' or SilkTouch.OS == 'iOS') and G.widescreen and 0.2 or 0)
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
G.consumeables.T.x = G.jokers.T.x + G.jokers.T.w + 0.2
'''
position = "at"
payload = '''
G.consumeables.T.x = G.jokers.T.x + G.jokers.T.w + 0.2 + ((SilkTouch.OS == 'Android' or SilkTouch.OS == 'iOS') and G.widescreen and 0.6 or 0)
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
G.deck.T.x = G.TILE_W - G.deck.T.w - 0.5
'''
position = "at"
payload = '''
G.deck.T.x = G.TILE_W - G.deck.T.w - 0.5 + ((SilkTouch.OS == 'Android' or SilkTouch.OS == 'iOS') and G.widescreen and 0.6 or 0)
'''
match_indent = true