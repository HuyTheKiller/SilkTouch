[manifest]
dump_lua = true
priority = 0
version = "1.0.0"

[[patches]]
[patches.pattern]
target = "conf.lua"
pattern = '''
function love.conf(t)
'''
position = "after"
payload = '''
    if love.system.getOS() == 'Android' or love.system.getOS() == 'iOS' then
        t.window.orientation = "landscape"
    end
'''
match_indent = true