[[patches]]
[patches.pattern]
target = "engine/controller.lua"
pattern = '''
self.cursor_up.target = self.hovering.target or self.focused.target
'''
position = "at"
payload = '''
self.cursor_up.target = self.hovering.target or self.focused.target or self.dragging.target
'''
match_indent = true
